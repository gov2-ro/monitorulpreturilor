# Rotation for the pipeline logs. Run (no root needed) via cron with a local state file:
#   logrotate -s data/logs/.logrotate.state scripts/logrotate.conf
#
# copytruncate is required: fetch_prices.py holds the log fd open for hours, so a
# rename-based rotation would leave it writing to the rotated file. copytruncate copies
# then truncates in place, keeping the same inode. (Tiny race: a few lines written during
# the copy can be lost — acceptable for progress/stats logs.)
/home/pax/g2-dev/monitorulpreturilor/data/logs/*.log {
    size 50M
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
