name: CI price fetch

# Runs once daily at 04:00 UTC. Spatial clustering reduces the full CI subset
# to ~1h, well within a single GH Actions run. The 1h45m time limit is kept
# as a safety net; if the store/product set grows significantly, restore the
# 4× daily schedule with resume-based checkpointing.
# Checkpoint committed to repo as data/prices_ci_checkpoint.json.

on:
  schedule:
    - cron: '0 4 * * *'    # 04:00 UTC daily
  workflow_dispatch:         # manual trigger via GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # hard GH cap; --max-runtime exits 15 min earlier
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tqdm

      # -----------------------------------------------------------------------
      # Fetch prices — resumes from checkpoint automatically if in_progress;
      # starts fresh for a new day (checkpoint from yesterday is ignored).
      # Stops after 1h45m so the job finishes well within GH's 2h limit.
      # -----------------------------------------------------------------------
      - name: Fetch prices
        run: |
          STORE_ARG="--limit-stores 150"
          PROD_ARG="--limit-products 200"
          [ -f data/ci_stores.txt ]   && STORE_ARG="--store-ids-file data/ci_stores.txt"
          [ -f data/ci_products.txt ] && PROD_ARG="--product-ids-file data/ci_products.txt"

          python fetch_prices.py data/prices_ci.db \
            $STORE_ARG $PROD_ARG \
            --max-runtime 6300

      # -----------------------------------------------------------------------
      # Gas reference data refresh (Mondays only — slow-changing data).
      # Use bash date check because github.event.schedule is always '0 4 * * *'
      # (single cron entry), so the startsWith trick against '0 4 * * 1' never
      # matches. Also force-run when gas_products table is empty (first run).
      # -----------------------------------------------------------------------
      - name: Refresh gas reference data
        run: |
          IS_MONDAY=$([ "$(date +%u)" = "1" ] && echo "1" || echo "0")
          HAS_PRODUCTS=$(python3 -c "import sqlite3; c=sqlite3.connect('data/prices_ci.db'); print(c.execute('SELECT COUNT(*) FROM gas_products').fetchone()[0])")
          if [ "$IS_MONDAY" = "1" ] || [ "$HAS_PRODUCTS" = "0" ]; then
            echo "Running gas reference refresh (Monday=$IS_MONDAY, products=$HAS_PRODUCTS)"
            python fetch_gas_reference.py data/prices_ci.db
          else
            echo "Skipping gas reference refresh (not Monday, products=$HAS_PRODUCTS)"
          fi

      # -----------------------------------------------------------------------
      # Gas price fetch — one request per UAT×fuel_type; fast (~15 min for
      # all UATs). --max-runtime 900 keeps total CI well within 2h limit.
      # -----------------------------------------------------------------------
      - name: Fetch gas prices
        run: python fetch_gas_prices.py data/prices_ci.db --max-runtime 900

      # -----------------------------------------------------------------------
      # Regenerate static site from updated DB
      # -----------------------------------------------------------------------
      - name: Generate site
        run: python generate_site.py --db data/prices_ci.db --out docs/

      - name: Export analytics CSVs
        run: python export_analytics.py data/prices_ci.db --out docs/data

      # -----------------------------------------------------------------------
      # Commit DB + checkpoint + docs (skip if nothing changed).
      # Pull --rebase before push to handle concurrent runs / manual triggers
      # writing to the same branch.
      # -----------------------------------------------------------------------
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/prices_ci.db data/prices_ci_checkpoint.json || true
          [ -f data/gas_checkpoint.json ] && git add data/gas_checkpoint.json
          [ -f data/ci_stores.txt ]   && git add data/ci_stores.txt
          [ -f data/ci_products.txt ] && git add data/ci_products.txt
          git add docs/index.html docs/price-index.html docs/fuel.html \
                  docs/pipeline.html docs/stores_map.html docs/gas_map.html \
                  docs/trends.html docs/CNAME || true
          git add docs/data/*.csv 2>/dev/null || true

          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(ci): fetch prices $(date -u +%FT%H:%MZ)"
          git pull --rebase --autostash origin main
          git push
