name: Weekly reference refresh

# Runs every Sunday at 03:00 UTC (one hour before the first daily price fetch).
# Refreshes retail reference data (networks, categories, products) in prices_ci.db.
#
# Store list (data/ci_stores.txt) and product subset (data/ci_products.txt) are
# NOT regenerated here — they are stable by design and updated manually after a
# full local fetch:
#
#   python build_ci_subset.py data/prices.db --debug
#   git add data/ci_stores.txt data/ci_products.txt
#   git commit -m "chore(ci): refresh store/product subset"
#   git push

on:
  schedule:
    - cron: '0 3 * * 0'   # Sunday 03:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests tqdm

      - name: Refresh reference data
        run: python fetch_reference.py data/prices_ci.db

      - name: Commit updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/prices_ci.db
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(ci): weekly reference refresh $(date -u +%F)"
          git push
